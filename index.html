<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>STYLE STORE</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Masculino</a>
            <a href="#">Feminino</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Nova Coleção 2026</h2>
        <p>Moda, estilo e conforto em um só lugar.</p>
        <button>Comprar Agora</button>
    </section>

    <section class="produtos">
        <h2>Produtos em Destaque</h2>

        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" alt="Camiseta">
                <h3>Camiseta Premium</h3>
                <p>R$ 89,90</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500" alt="Jaqueta">
                <h3>Jaqueta Moderna</h3>
                <p>R$ 199,90</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500" alt="Vestido">
                <h3>Vestido Elegante</h3>
                <p>R$ 149,90</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Style Store - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
